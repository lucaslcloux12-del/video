<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação Escolar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #121212; /* Fundo escuro para destacar o vídeo */
            font-family: Arial, sans-serif;
            color: white;
        }
        h1 { margin-bottom: 20px; font-size: 1.5rem; }
        .video-container {
            width: 90%;
            max-width: 1000px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video { width: 100%; display: block; }
        .footer { margin-top: 20px; font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>

    <h1>Título da Minha Apresentação</h1>

    <div class="video-container">
        <!-- O caminho aponta para a pasta public -->
        <video controls poster="public/capa.jpg">
            <source src="public/video.mp4" type="video/mp4">
            Seu navegador não suporta a reprodução de vídeo.
        </video>
    </div>

    <div class="footer">Clique no play para iniciar • Projeto via Vercel</div>

</body>
</html>
